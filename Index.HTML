<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dis-moi oui...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            touch-action: manipulation;
        }

        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #yes-btn:hover {
            background-color: #ff758f;
            transform: scale(1.1);
        }

        #no-btn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            z-index: 10;
        }

        .success-screen {
            display: none;
        }

        .success-screen h1 {
            color: #38b000;
        }
    </style>
</head>
<body>

    <!-- Écran Principal -->
    <div class="container" id="main-card">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" alt="Cute cat">
        </div>
        <h1>Tu veux être mon copain ? 💖</h1>
        <div class="buttons">
            <button id="yes-btn" onclick="celebrate()">Oui !</button>
            <button id="no-btn" onmouseover="moveButton()" ontouchstart="moveButton(event)" onclick="moveButton(event)">Non</button>
        </div>
    </div>

    <!-- Écran de Succès -->
    <div class="container success-screen" id="success-card">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/g9GnnuHqLvEve/giphy.gif" alt="Happy dance">
        </div>
        <h1>Gagné ! Je t'aime déjà ! 🎉❤️</h1>
        <p style="margin-top: 15px; color: #555;">Prépare-toi pour notre prochain rendez-vous !</p>
    </div>

    <script>
        function moveButton(e) {
            if (e) {
                e.preventDefault();
            }

            const noBtn = document.getElementById('no-btn');
            
            const padding = 80;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function celebrate() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('success-card').style.display = 'block';
        }
    </script>
</body>
</html>
